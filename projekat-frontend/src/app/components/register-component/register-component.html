<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Kreiraj nalog</mat-card-title>
    </mat-card-header>
    
    <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
      <mat-card-content>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Ime</mat-label>
          <input matInput formControlName="ime">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Prezime</mat-label>
          <input matInput formControlName="prezime">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Jmbg</mat-label>
          <input matInput maxlength="13" placeholder="13 brojeva" formControlName="jmbg">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Korisničko ime</mat-label>
          <input matInput formControlName="korisnickoIme">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Lozinka</mat-label>
          <input matInput type="password" formControlName="lozinka">
        </mat-form-field>
      </mat-card-content>

      <mat-card-actions>
        <button mat-raised-button color="primary" class="full-width" [disabled]="registerForm.invalid">
          REGISTRUJ SE
        </button>
      </mat-card-actions>
    </form>

    <mat-card-footer class="auth-footer">
      <p>Već imate nalog? <a routerLink="/login">Prijavite se ovde</a></p>
    </mat-card-footer>
  </mat-card>
</div>
