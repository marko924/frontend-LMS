<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Prijava na sistem</mat-card-title>
    </mat-card-header>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-card-content>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Korisničko ime</mat-label>
          <input matInput formControlName="username" placeholder="Unesite korisnicko ime">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Lozinka</mat-label>
          <input matInput type="password" formControlName="password">
        </mat-form-field>
      </mat-card-content>

      <mat-card-actions>
        <button mat-raised-button color="primary" class="full-width" [disabled]="loginForm.invalid">
          PRIJAVI SE
        </button>
      </mat-card-actions>
    </form>
    <mat-card-footer class="auth-footer">
       <p>Nemaš nalog? <a routerLink="/register">Registruj se besplatno</a></p>
    </mat-card-footer>
  </mat-card>
</div>
