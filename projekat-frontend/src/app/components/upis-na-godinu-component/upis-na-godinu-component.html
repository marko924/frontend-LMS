<div class="upis-container">
  <div class="upis-card">
    <h2>Upis studenta na godinu</h2>

    <form [formGroup]="forma" (ngSubmit)="sacuvaj()">

      <select formControlName="fakultetId" (change)="onFakultetChange()">
        <option value="">-- Izaberi fakultet --</option>
        <option *ngFor="let f of fakulteti" [value]="f.id">{{ f.naziv }}</option>
      </select>

      <select formControlName="studijskiProgramId">
        <option value="">-- Izaberi program --</option>
        <option *ngFor="let p of filtriraniProgrami" [value]="p.id">{{ p.naziv }}</option>
      </select>

      <select formControlName="godinaStudija">
        <option value="">-- Izaberi godinu --</option>
        <option *ngFor="let g of godineStudija" [value]="g">{{ g }}</option>
      </select>

      <button type="submit">Upiši</button>
    </form>

    <div class="upis-footer">
      <span class="error-message" *ngIf="forma.invalid">Popunite sva polja ispravno</span>
    </div>
  </div>
</div>
