<div class="main-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Predmeti na mom studijskom programu</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <table mat-table [dataSource]="mojiPredmeti" class="full-width-table mat-elevation-z1">
        
        <ng-container matColumnDef="naziv">
          <th mat-header-cell *matHeaderCellDef> Naziv predmeta </th>
          <td mat-cell *matCellDef="let p"> {{ p.naziv }} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['naziv']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['naziv'];"></tr>

      </table>

      <div *ngIf="mojiPredmeti.length === 0" class="empty-state">
        Nema dostupnih predmeta za prikaz.
      </div>
    </mat-card-content>
  </mat-card>
</div>
