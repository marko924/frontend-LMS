<div class="container">
  <mat-card class="filter-card shadow-card">
    <mat-card-header>
      <mat-card-title>Unos ocena</mat-card-title>
      <mat-card-subtitle>Odaberite parametre za prikaz studenata</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content class="filter-container">
      
      <mat-form-field appearance="outline" class="flex-item">
        <mat-label>Ispitni rok</mat-label>
        <mat-select [(ngModel)]="izabraniRokId" (selectionChange)="onFilterChange()">
          <mat-option *ngFor="let rok of rokovi" [value]="rok.id">
            {{ rok.naziv }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="flex-item">
        <mat-label>Predmet</mat-label>
        <mat-select [(ngModel)]="izabranaRealizacijaId" (selectionChange)="onFilterChange()">
          <mat-option *ngFor="let r of mojeRealizacije" [value]="r.id">
            {{ r.naziv }}
          </mat-option>
        </mat-select>
      </mat-form-field>

    </mat-card-content>
  </mat-card>

  <mat-card class="table-card shadow-card" *ngIf="studentiZaOcenjivanje.length > 0">
    <table mat-table [dataSource]="studentiZaOcenjivanje" class="full-width">
      
      <ng-container matColumnDef="student">
        <th mat-header-cell *matHeaderCellDef> Student </th>
        <td mat-cell *matCellDef="let s"> {{ s.imePrezime }} </td>
      </ng-container>

      <ng-container matColumnDef="index">
        <th mat-header-cell *matHeaderCellDef> Indeks </th>
        <td mat-cell *matCellDef="let s"> {{ s.brojIndeksa }} </td>
      </ng-container>

      <ng-container matColumnDef="bodovi">
        <th mat-header-cell *matHeaderCellDef> Bodovi (0-100) </th>
        <td mat-cell *matCellDef="let s">
          <mat-form-field class="small-input" appearance="fill">
            <input matInput type="number" [(ngModel)]="s.osvojeniBodovi" 
                   (ngModelChange)="izracunajOcenu(s)" min="0" max="100">
          </mat-form-field>
        </td>
      </ng-container>

      <ng-container matColumnDef="ocena">
        <th mat-header-cell *matHeaderCellDef> Ocena </th>
        <td mat-cell *matCellDef="let s">
          <mat-form-field class="small-input" appearance="fill">
            <input matInput type="number" [(ngModel)]="s.ocena" readonly>
          </mat-form-field>
        </td>
      </ng-container>

      <ng-container matColumnDef="akcija">
        <th mat-header-cell *matHeaderCellDef> Akcija </th>
        <td mat-cell *matCellDef="let s">
          <button mat-flat-button color="primary" 
                  (click)="sacuvajOcenu(s)">
            Potvrdi
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['student', 'index', 'bodovi', 'ocena', 'akcija']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['student', 'index', 'bodovi', 'ocena', 'akcija'];"></tr>
    </table>
  </mat-card>

  <div *ngIf="izabranaRealizacijaId && studentiZaOcenjivanje.length === 0" class="info-box">
    Trenutno nema neocenjenih studenata za odabrane kriterijume.
  </div>
</div>
